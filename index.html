<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Balloon Archer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #5BA3D8;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
        }
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: max(16px, env(safe-area-inset-top)) 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .pill {
            background: rgba(255,255,255,0.88);
            border-radius: 999px;
            padding: 10px 24px;
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            font-weight: 800;
            font-size: 26px;
            color: #1a1a2e;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            letter-spacing: 0.3px;
        }
        .pill em { color: #e74c3c; font-style: normal; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hud">
    <div class="pill">Score&nbsp;<em id="score">0</em></div>
    <div class="pill">Best&nbsp;<em id="best">0</em></div>
</div>
<script>
'use strict';

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');

// ─── VIEWPORT ────────────────────────────────────────────────
let W, H, dpr;

function resize() {
    W   = window.innerWidth;
    H   = window.innerHeight;
    dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    setupLayout();
}

window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

// ─── LAYOUT ──────────────────────────────────────────────────
const BOW_SPREAD = 48;  // half-width between limb tips
const BOW_HEIGHT = 95;  // vertical height from grip to limb tips
const MAX_DRAG   = 185;
const MAX_SPEED  = 23;
const GRAVITY    = 0.38;

let BOW_X, BOW_Y;
let LIMB_L = {}, LIMB_R = {}; // tip positions

function setupLayout() {
    BOW_X = W / 2;
    BOW_Y = H - 110;
    LIMB_L.x = BOW_X - BOW_SPREAD;
    LIMB_L.y = BOW_Y - BOW_HEIGHT;
    LIMB_R.x = BOW_X + BOW_SPREAD;
    LIMB_R.y = BOW_Y - BOW_HEIGHT;
    if (!arrow.flying) resetArrow();
    if (!balloon.active) spawnBalloon();
}

// ─── COLOURS ─────────────────────────────────────────────────
const BALLOON_COLORS = [
    '#FF6B6B','#FF9F43','#FFD93D',
    '#6BCB77','#4D96FF','#C77DFF','#FF6BB5'
];

function lighten(hex, a) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;
}
function darken(hex, a) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;
}

// ─── GAME STATE ──────────────────────────────────────────────
let score = 0;
let best  = +localStorage.getItem('ba_best') || 0;
bestEl.textContent = best;

// ─── BALLOON ─────────────────────────────────────────────────
let balloon = {
    active: false,
    x: 0, y: 0, r: 60,
    vx: 0, bobT: 0, baseY: 0,
    color: '#FF6B6B',
    popT: -1   // -1 = alive; 1→0 = popping
};

function spawnBalloon() {
    const margin = 90;
    const speed  = 1.5 + Math.random() * 1.5 + score * 0.06;
    balloon.x      = margin + Math.random() * (W - margin * 2);
    balloon.baseY  = H * 0.10 + Math.random() * H * 0.18;
    balloon.y      = balloon.baseY;
    balloon.vx     = (Math.random() < 0.5 ? 1 : -1) * speed;
    balloon.bobT   = Math.random() * Math.PI * 2;
    balloon.color  = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
    balloon.r      = Math.max(36, 60 - score * 0.6);  // gets smaller up to a minimum
    balloon.active = true;
    balloon.popT   = -1;
}

// ─── ARROW ───────────────────────────────────────────────────
let arrow = {
    x: 0, y: 0, vx: 0, vy: 0,
    angle: -Math.PI / 2,
    flying: false
};

function resetArrow() {
    arrow.x = BOW_X; arrow.y = BOW_Y;
    arrow.vx = 0; arrow.vy = 0;
    arrow.angle = -Math.PI / 2;
    arrow.flying = false;
}

// ─── AIMING ──────────────────────────────────────────────────
let aiming = false, aimX = 0, aimY = 0, activeTouchId = null;

function getStringMid() {
    return { x: (LIMB_L.x + LIMB_R.x) / 2, y: (LIMB_L.y + LIMB_R.y) / 2 };
}

function nearBow(x, y) {
    const dx = x - BOW_X, dy = y - BOW_Y;
    return dx*dx + dy*dy < 160*160;
}

function startAim(x, y) {
    if (arrow.flying || !balloon.active || balloon.popT >= 0) return false;
    if (!nearBow(x, y)) return false;
    aiming = true; aimX = x; aimY = y;
    return true;
}

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        const r = canvas.getBoundingClientRect();
        const x = t.clientX - r.left, y = t.clientY - r.top;
        if (activeTouchId === null && startAim(x, y)) {
            activeTouchId = t.identifier; break;
        }
    }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (t.identifier === activeTouchId) {
            const r = canvas.getBoundingClientRect();
            aimX = t.clientX - r.left;
            aimY = t.clientY - r.top;
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (t.identifier === activeTouchId) {
            if (aiming) shoot();
            aiming = false; activeTouchId = null;
        }
    }
}, { passive: false });

canvas.addEventListener('touchcancel', () => { aiming = false; activeTouchId = null; }, { passive: false });

// Mouse (desktop / simulator)
let mouseDown = false;
canvas.addEventListener('mousedown', e => {
    const r = canvas.getBoundingClientRect();
    if (startAim(e.clientX - r.left, e.clientY - r.top)) mouseDown = true;
});
canvas.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const r = canvas.getBoundingClientRect();
    aimX = e.clientX - r.left; aimY = e.clientY - r.top;
});
canvas.addEventListener('mouseup', () => {
    if (mouseDown && aiming) shoot();
    mouseDown = false; aiming = false;
});

// ─── SHOOT ───────────────────────────────────────────────────
function shoot() {
    const sm = getStringMid();
    const dx = sm.x - aimX, dy = sm.y - aimY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 10) return;
    const power = Math.min(dist / MAX_DRAG, 1);
    const speed = power * MAX_SPEED;
    arrow.x = aimX; arrow.y = aimY;
    arrow.vx = (dx / dist) * speed;
    arrow.vy = (dy / dist) * speed;
    arrow.angle = Math.atan2(dy, dx);
    arrow.flying = true;
    aiming = false;
}

// ─── PARTICLES ───────────────────────────────────────────────
let particles = [];

function burst(x, y, color) {
    for (let i = 0; i < 40; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 3 + Math.random() * 10;
        particles.push({
            x, y,
            vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2.5,
            r: 4 + Math.random() * 9,
            life: 1,
            decay: 0.016 + Math.random() * 0.014,
            color: Math.random() < 0.7 ? color
                   : (Math.random() < 0.5 ? '#FFD700' : '#FFFFFF')
        });
    }
}

// ─── FLOATING SCORE ──────────────────────────────────────────
let floatTexts = [];

// ─── CLOUDS ──────────────────────────────────────────────────
let clouds = [];

function initClouds() {
    clouds = [];
    for (let i = 0; i < 6; i++) {
        clouds.push({
            x:     Math.random() * W,
            y:     H * (0.04 + Math.random() * 0.28),
            speed: 0.2 + Math.random() * 0.35,
            scale: 0.65 + Math.random() * 0.65,
            alpha: 0.55 + Math.random() * 0.4
        });
    }
}

// ─── UPDATE ──────────────────────────────────────────────────
function update() {
    // Clouds drift
    for (const c of clouds) {
        c.x += c.speed;
        if (c.x > W + 160) c.x = -160;
    }

    // Balloon movement
    if (balloon.active && balloon.popT < 0) {
        balloon.x   += balloon.vx;
        balloon.bobT += 0.022;
        balloon.y    = balloon.baseY + Math.sin(balloon.bobT) * 14;
        // Bounce off walls
        if (balloon.x < balloon.r + 20 || balloon.x > W - balloon.r - 20) {
            balloon.vx *= -1;
            balloon.x   = Math.max(balloon.r + 20, Math.min(W - balloon.r - 20, balloon.x));
        }
    }

    // Pop animation (shrink)
    if (balloon.popT >= 0) {
        balloon.popT -= 0.05;
        if (balloon.popT <= 0) {
            balloon.active = false;
            setTimeout(spawnBalloon, 700);
        }
    }

    // Arrow physics
    if (arrow.flying) {
        arrow.vy    += GRAVITY;
        arrow.x     += arrow.vx;
        arrow.y     += arrow.vy;
        arrow.angle  = Math.atan2(arrow.vy, arrow.vx);

        // Hit balloon?
        if (balloon.active && balloon.popT < 0) {
            const dx = arrow.x - balloon.x, dy = arrow.y - balloon.y;
            if (dx*dx + dy*dy < (balloon.r + 10) * (balloon.r + 10)) {
                popBalloon();
            }
        }

        // Off screen → miss
        if (arrow.x < -200 || arrow.x > W + 200 || arrow.y > H + 150 || arrow.y < -H * 0.5) {
            resetArrow();
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.28;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Floating score texts
    for (let i = floatTexts.length - 1; i >= 0; i--) {
        const t = floatTexts[i];
        t.y   -= 1.8;
        t.life -= 0.022;
        if (t.life <= 0) floatTexts.splice(i, 1);
    }
}

function popBalloon() {
    burst(balloon.x, balloon.y, balloon.color);
    balloon.popT  = 1;
    arrow.flying  = false;
    arrow.x = BOW_X; arrow.y = BOW_Y; arrow.angle = -Math.PI / 2;

    score++;
    scoreEl.textContent = score;
    if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('ba_best', best);
    }

    floatTexts.push({ x: balloon.x, y: balloon.y - balloon.r - 10, life: 1 });
}

// ─── DRAW ────────────────────────────────────────────────────
function draw() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawClouds();
    if (balloon.active) drawBalloon();
    drawTrajectory();
    drawBow();
    if (arrow.flying) drawArrow(arrow.x, arrow.y, arrow.angle, 1);
    drawParticles();
    drawFloatTexts();
    drawHint();
}

function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0,    '#4A90C8');
    g.addColorStop(0.5,  '#8ECAE6');
    g.addColorStop(0.72, '#B8E4C8');
    g.addColorStop(0.82, '#90D878');
    g.addColorStop(1,    '#3A7D44');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Ground
    ctx.fillStyle = '#3A7D44';
    ctx.fillRect(0, H - 60, W, 60);
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(0, H - 60, W, 16);
    // Grass blades
    ctx.fillStyle = '#5DBB63';
    for (let x = 0; x < W; x += 20) {
        const h = 8 + Math.sin(x * 0.18) * 5;
        ctx.fillRect(x, H - 60, 3, -h);
    }
}

function drawCloud(x, y, scale, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FFFFFF';
    ctx.shadowColor = 'rgba(0,0,0,0.06)';
    ctx.shadowBlur  = 14;
    const s = scale;
    ctx.beginPath();
    ctx.arc(x,            y,            38 * s, 0, Math.PI * 2);
    ctx.arc(x + 42 * s,  y - 14 * s,  30 * s, 0, Math.PI * 2);
    ctx.arc(x + 78 * s,  y,            34 * s, 0, Math.PI * 2);
    ctx.arc(x + 40 * s,  y + 16 * s,  28 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawClouds() {
    for (const c of clouds) drawCloud(c.x, c.y, c.scale, c.alpha);
}

function drawBalloon() {
    const { x, y, r, color, popT } = balloon;
    const scale = popT >= 0 ? Math.max(0, popT) : 1;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);

    // String
    ctx.strokeStyle = 'rgba(60,60,60,0.65)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, r);
    ctx.quadraticCurveTo(10, r + 28, 4, r + 72);
    ctx.stroke();

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.10)';
    ctx.beginPath();
    ctx.ellipse(5, r + 4, r * 0.55, r * 0.14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Main balloon body
    const grd = ctx.createRadialGradient(-r * 0.28, -r * 0.32, r * 0.04, 0, 0, r * 1.18);
    grd.addColorStop(0,   lighten(color, 80));
    grd.addColorStop(0.35, lighten(color, 40));
    grd.addColorStop(0.75, color);
    grd.addColorStop(1,   darken(color, 45));
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, -r * 0.06, r, r * 1.14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Specular highlight
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.beginPath();
    ctx.ellipse(-r * 0.24, -r * 0.34, r * 0.20, r * 0.34, -0.35, 0, Math.PI * 2);
    ctx.fill();

    // Knot
    ctx.fillStyle = darken(color, 55);
    ctx.beginPath();
    ctx.arc(0, r, 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawBow() {
    const gx = BOW_X, gy = BOW_Y;
    const lx = LIMB_L.x, ly = LIMB_L.y;
    const rx = LIMB_R.x, ry = LIMB_R.y;

    // Limb shadow
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(gx + 3, gy + 18);
    ctx.quadraticCurveTo(gx - 62, gy - 28, lx + 3, ly + 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx + 3, gy + 18);
    ctx.quadraticCurveTo(gx + 68, gy - 28, rx + 3, ry + 3);
    ctx.stroke();

    // Bow limbs (wood)
    const woodGrad = ctx.createLinearGradient(gx - 8, 0, gx + 8, 0);
    woodGrad.addColorStop(0, '#6B3A2A');
    woodGrad.addColorStop(0.45, '#A0522D');
    woodGrad.addColorStop(1, '#8B4513');
    ctx.strokeStyle = woodGrad;
    ctx.lineWidth = 11;
    ctx.beginPath();
    ctx.moveTo(gx, gy + 16);
    ctx.quadraticCurveTo(gx - 65, gy - 28, lx, ly);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx, gy + 16);
    ctx.quadraticCurveTo(gx + 65, gy - 28, rx, ry);
    ctx.stroke();

    // Grip wrap
    ctx.strokeStyle = '#C8A46A';
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(gx, gy - 14);
    ctx.lineTo(gx, gy + 24);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(100,70,20,0.55)';
    ctx.lineWidth = 1.5;
    for (let yy = gy - 12; yy < gy + 24; yy += 5) {
        ctx.beginPath();
        ctx.moveTo(gx - 7, yy);
        ctx.lineTo(gx + 7, yy);
        ctx.stroke();
    }

    // Limb tips
    ctx.fillStyle = '#3D1C0A';
    [LIMB_L, LIMB_R].forEach(t => {
        ctx.beginPath();
        ctx.arc(t.x, t.y, 5, 0, Math.PI * 2);
        ctx.fill();
    });

    // String
    const sm = aiming ? { x: aimX, y: aimY } : getStringMid();
    ctx.strokeStyle = 'rgba(230,230,230,0.9)';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'butt';
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(sm.x, sm.y);
    ctx.lineTo(rx, ry);
    ctx.stroke();

    // Arrow at bow (when not flying)
    if (!arrow.flying) {
        const ref = getStringMid();
        const ax  = aiming ? aimX : ref.x;
        const ay  = aiming ? aimY : ref.y;
        const ang = aiming
            ? Math.atan2(ref.y - aimY, ref.x - aimX)
            : -Math.PI / 2;
        drawArrow(ax, ay, ang, 1);
    }
}

function drawArrow(x, y, angle, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.rotate(angle);

    const L = 74;

    // Shaft
    ctx.shadowColor = 'rgba(0,0,0,0.22)';
    ctx.shadowBlur  = 5;
    ctx.shadowOffsetY = 2;
    const shaftGrd = ctx.createLinearGradient(0, -3, 0, 3);
    shaftGrd.addColorStop(0, '#E8C870');
    shaftGrd.addColorStop(0.5, '#D4A96A');
    shaftGrd.addColorStop(1, '#A07840');
    ctx.strokeStyle = shaftGrd;
    ctx.lineWidth   = 5;
    ctx.lineCap = 'butt';
    ctx.beginPath();
    ctx.moveTo(-L/2 + 12, 0);
    ctx.lineTo( L/2 - 16, 0);
    ctx.stroke();

    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Arrowhead
    ctx.fillStyle   = '#B0B0BA';
    ctx.strokeStyle = '#888';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo( L/2,      0);
    ctx.lineTo( L/2 - 20, -7);
    ctx.lineTo( L/2 - 13, 0);
    ctx.lineTo( L/2 - 20, 7);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Nock
    ctx.fillStyle = '#5C3010';
    ctx.beginPath();
    ctx.arc(-L/2 + 12, 0, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // Fletching vanes
    const fletchColors = ['#CC2222','#CC2222','#AA1111'];
    const offsets = [[0, -11], [0, 11], [-2, -16]];
    offsets.forEach(([yOff, yTip], i) => {
        ctx.fillStyle = fletchColors[i];
        ctx.beginPath();
        ctx.moveTo(-L/2 + 12, yOff < 0 ? 0 : 0);
        ctx.lineTo(-L/2 + 30, yTip);
        ctx.lineTo(-L/2 + 32, yOff < 0 ? 0 : 0);
        ctx.closePath();
        ctx.fill();
    });

    ctx.restore();
}

function drawTrajectory() {
    if (!aiming) return;
    const sm = getStringMid();
    const dx = sm.x - aimX, dy = sm.y - aimY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 10) return;

    const power = Math.min(dist / MAX_DRAG, 1);
    const speed = power * MAX_SPEED;
    let vx = (dx/dist)*speed, vy = (dy/dist)*speed;
    let px = aimX, py = aimY;

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth   = 2;
    ctx.setLineDash([6, 11]);
    ctx.beginPath();
    ctx.moveTo(px, py);
    for (let i = 0; i < 90; i++) {
        vy += GRAVITY; px += vx; py += vy;
        if (py > H + 60 || px < -80 || px > W + 80) break;
        ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    drawPowerMeter(power);
}

function drawPowerMeter(power) {
    const bw = 150, bh = 16, bx = 24, by = H - 98;

    ctx.save();
    // Background panel
    ctx.fillStyle = 'rgba(0,0,0,0.38)';
    pill(ctx, bx - 8, by - 26, bw + 16, bh + 32, 12);
    ctx.fill();

    // Track
    ctx.fillStyle = '#333';
    pill(ctx, bx, by, bw, bh, 6);
    ctx.fill();

    // Fill
    if (power > 0) {
        const hue = Math.round(120 - power * 120);
        ctx.fillStyle = `hsl(${hue},90%,50%)`;
        pill(ctx, bx, by, bw * power, bh, 6);
        ctx.fill();
    }

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = 'bold 13px -apple-system, system-ui, sans-serif';
    ctx.fillText('POWER', bx, by - 7);
    ctx.restore();
}

function pill(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
}

function drawParticles() {
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle   = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur  = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * Math.max(0, p.life), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function drawFloatTexts() {
    ctx.textAlign = 'center';
    for (const t of floatTexts) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, t.life);
        ctx.font = 'bold 52px -apple-system, system-ui, sans-serif';
        ctx.strokeStyle = '#8B6914';
        ctx.lineWidth   = 5;
        ctx.fillStyle   = '#FFD700';
        ctx.strokeText('+1', t.x, t.y);
        ctx.fillText('+1', t.x, t.y);
        ctx.restore();
    }
    ctx.textAlign = 'left';
}

function drawHint() {
    if (score > 0 || arrow.flying) return;
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.78)';
    ctx.font = 'bold 20px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Drag from the bow to aim · Release to shoot!', W / 2, H - 170);
    ctx.textAlign = 'left';
    ctx.restore();
}

// ─── LOOP ────────────────────────────────────────────────────
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// ─── BOOT ────────────────────────────────────────────────────
resize();
initClouds();
spawnBalloon();
loop();
</script>
</body>
</html>
