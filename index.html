<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Balloon Archer">
    <meta name="theme-color" content="#4A90C8">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Balloon Archer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #5BA3D8;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
        }
        #hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: max(16px, env(safe-area-inset-top)) 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .pill {
            background: rgba(255,255,255,0.88);
            border-radius: 999px;
            padding: 10px 24px;
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            font-weight: 800;
            font-size: 26px;
            color: #1a1a2e;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            letter-spacing: 0.3px;
        }
        .pill em { color: #e74c3c; font-style: normal; }

        /* ── REFRESH BUTTON ── */
        #update-btn {
            position: fixed;
            bottom: clamp(12px, 3vw, 20px);
            right:  clamp(12px, 3vw, 20px);
            width:  clamp(36px, 6vw, 46px);
            height: clamp(36px, 6vw, 46px);
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            border: 2px solid rgba(255,255,255,0.30);
            color: rgba(255,255,255,0.55);
            font-size: clamp(17px, 3.5vw, 23px);
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            touch-action: manipulation;
            transition: background .15s, color .15s, transform .25s;
        }
        #update-btn:active {
            background: rgba(255,255,255,0.32);
            color: #fff;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hud">
    <div class="pill">Score&nbsp;<em id="score">0</em></div>
    <div class="pill">Best&nbsp;<em id="best">0</em></div>
</div>
<button id="update-btn" onclick="hardRefresh()" title="Refresh app (clear cache)">⟳</button>
<script>
'use strict';

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');

// ─── VIEWPORT ────────────────────────────────────────────────
let W, H, dpr;

function resize() {
    W   = window.innerWidth;
    H   = window.innerHeight;
    dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    setupLayout();
}

window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

// ─── LAYOUT ──────────────────────────────────────────────────
const BOW_SPREAD = 48;  // half-width between limb tips
const BOW_HEIGHT = 95;  // vertical height from grip to limb tips
const MAX_DRAG   = 185;
const MAX_SPEED  = 23;
const GRAVITY    = 0.38;

let BOW_X, BOW_Y;
let LIMB_L = {}, LIMB_R = {}; // tip positions

function setupLayout() {
    BOW_X = W / 2;
    BOW_Y = H - 110;
    LIMB_L.x = BOW_X - BOW_SPREAD;
    LIMB_L.y = BOW_Y - BOW_HEIGHT;
    LIMB_R.x = BOW_X + BOW_SPREAD;
    LIMB_R.y = BOW_Y - BOW_HEIGHT;
    if (!arrow.flying) resetArrow();
    if (!balloon.active) spawnBalloon();
    setupDog();
}

// ─── COLOURS ─────────────────────────────────────────────────
const BALLOON_COLORS = [
    '#FF6B6B','#FF9F43','#FFD93D',
    '#6BCB77','#4D96FF','#C77DFF','#FF6BB5'
];

function lighten(hex, a) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;
}
function darken(hex, a) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;
}

// ─── DOG ─────────────────────────────────────────────────────
const DOG_LAUGH_FRAMES = 110;
let dog = {
    state: 'hidden',  // 'hidden' | 'rising' | 'laughing' | 'falling'
    x: 0,
    y: 0,      // current head-centre Y
    peekY: 0,  // head-centre Y when fully visible
    hideY: 0,  // head-centre Y when off-screen
    timer: 0,
    frame: 0,
};

function setupDog() {
    dog.x     = Math.min(W * 0.17, 155);
    dog.hideY = H + 100;
    dog.peekY = H - 162;
    if (dog.state === 'hidden') dog.y = dog.hideY;
}

function triggerDog() {
    if (dog.state !== 'hidden' || gameOver) return;
    dog.state = 'rising';
    dog.y     = dog.hideY;
    dog.timer = DOG_LAUGH_FRAMES;
    dog.frame = 0;
}

function updateDog() {
    if (dog.state === 'hidden') return;
    dog.frame++;
    if (dog.state === 'rising') {
        dog.y -= 6;
        if (dog.y <= dog.peekY) { dog.y = dog.peekY; dog.state = 'laughing'; playDogLaugh(); }
    } else if (dog.state === 'laughing') {
        if (--dog.timer <= 0) dog.state = 'falling';
    } else if (dog.state === 'falling') {
        dog.y += 7;
        if (dog.y >= dog.hideY) { dog.y = dog.hideY; dog.state = 'hidden'; }
    }
}

// ─── GAME STATE ──────────────────────────────────────────────
const MAX_ARROWS = 10;
let arrowsLeft = MAX_ARROWS;
let gameOver   = false;
let score = 0;
let best  = +localStorage.getItem('ba_best') || 0;
bestEl.textContent = best;

// ─── BALLOON ─────────────────────────────────────────────────
let balloon = {
    active: false,
    x: 0, y: 0, r: 60,
    vx: 0, bobT: 0, baseY: 0,
    color: '#FF6B6B',
    popT: -1   // -1 = alive; 1→0 = popping
};

function spawnBalloon() {
    const margin = 90;
    const speed  = 1.5 + Math.random() * 1.5 + score * 0.06;
    balloon.x      = margin + Math.random() * (W - margin * 2);
    balloon.baseY  = H * 0.10 + Math.random() * H * 0.18;
    balloon.y      = balloon.baseY;
    balloon.vx     = (Math.random() < 0.5 ? 1 : -1) * speed;
    balloon.bobT   = Math.random() * Math.PI * 2;
    balloon.color  = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
    balloon.r      = Math.max(36, 60 - score * 0.6);  // gets smaller up to a minimum
    balloon.active = true;
    balloon.popT   = -1;
}

// ─── ARROW ───────────────────────────────────────────────────
let arrow = {
    x: 0, y: 0, vx: 0, vy: 0,
    angle: -Math.PI / 2,
    flying: false
};

function resetArrow() {
    arrow.x = BOW_X; arrow.y = BOW_Y;
    arrow.vx = 0; arrow.vy = 0;
    arrow.angle = -Math.PI / 2;
    arrow.flying = false;
}

// ─── AIMING ──────────────────────────────────────────────────
let aiming = false, aimX = 0, aimY = 0, activeTouchId = null;

function getStringMid() {
    return { x: (LIMB_L.x + LIMB_R.x) / 2, y: (LIMB_L.y + LIMB_R.y) / 2 };
}

function nearBow(x, y) {
    const dx = x - BOW_X, dy = y - BOW_Y;
    return dx*dx + dy*dy < 160*160;
}

function startAim(x, y) {
    if (gameOver || arrow.flying || arrowsLeft === 0 || !balloon.active || balloon.popT >= 0) return false;
    if (!nearBow(x, y)) return false;
    aiming = true; aimX = x; aimY = y;
    return true;
}

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    getAC(); // unlock AudioContext on first touch (iOS requirement)
    if (gameOver) { restart(); return; }
    for (const t of e.changedTouches) {
        const r = canvas.getBoundingClientRect();
        const x = t.clientX - r.left, y = t.clientY - r.top;
        if (activeTouchId === null && startAim(x, y)) {
            activeTouchId = t.identifier; break;
        }
    }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (t.identifier === activeTouchId) {
            const r = canvas.getBoundingClientRect();
            aimX = t.clientX - r.left;
            aimY = t.clientY - r.top;
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (t.identifier === activeTouchId) {
            if (aiming) shoot();
            aiming = false; activeTouchId = null;
        }
    }
}, { passive: false });

canvas.addEventListener('touchcancel', () => { aiming = false; activeTouchId = null; }, { passive: false });

// Mouse (desktop / simulator)
let mouseDown = false;
canvas.addEventListener('mousedown', e => {
    getAC();
    if (gameOver) { restart(); return; }
    const r = canvas.getBoundingClientRect();
    if (startAim(e.clientX - r.left, e.clientY - r.top)) mouseDown = true;
});
canvas.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const r = canvas.getBoundingClientRect();
    aimX = e.clientX - r.left; aimY = e.clientY - r.top;
});
canvas.addEventListener('mouseup', () => {
    if (mouseDown && aiming) shoot();
    mouseDown = false; aiming = false;
});

// ─── SHOOT ───────────────────────────────────────────────────
function shoot() {
    const sm = getStringMid();
    const dx = sm.x - aimX, dy = sm.y - aimY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 10) return;
    const power = Math.min(dist / MAX_DRAG, 1);
    const speed = power * MAX_SPEED;
    arrow.x = aimX; arrow.y = aimY;
    arrow.vx = (dx / dist) * speed;
    arrow.vy = (dy / dist) * speed;
    arrow.angle = Math.atan2(dy, dx);
    arrow.flying = true;
    aiming = false;
    arrowsLeft--;
    playShoot();
}

// ─── PARTICLES ───────────────────────────────────────────────
let particles = [];

function burst(x, y, color) {
    for (let i = 0; i < 40; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 3 + Math.random() * 10;
        particles.push({
            x, y,
            vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2.5,
            r: 4 + Math.random() * 9,
            life: 1,
            decay: 0.016 + Math.random() * 0.014,
            color: Math.random() < 0.7 ? color
                   : (Math.random() < 0.5 ? '#FFD700' : '#FFFFFF')
        });
    }
}

// ─── FLOATING SCORE ──────────────────────────────────────────
let floatTexts = [];

// ─── CLOUDS ──────────────────────────────────────────────────
let clouds = [];

function initClouds() {
    clouds = [];
    for (let i = 0; i < 6; i++) {
        clouds.push({
            x:     Math.random() * W,
            y:     H * (0.04 + Math.random() * 0.28),
            speed: 0.2 + Math.random() * 0.35,
            scale: 0.65 + Math.random() * 0.65,
            alpha: 0.55 + Math.random() * 0.4
        });
    }
}

// ─── AUDIO ───────────────────────────────────────────────────
let _ac = null;
function getAC() {
    if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
    if (_ac.state === 'suspended') _ac.resume().catch(() => {});
    return _ac;
}

function noise(ac, duration) {
    const len = (ac.sampleRate * duration) | 0;
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf;
    return src;
}

function playShoot() {
    try {
        const ac = getAC(), t = ac.currentTime;

        // Snap — short filtered noise burst
        const ns  = noise(ac, 0.055);
        const bpf = ac.createBiquadFilter();
        bpf.type = 'bandpass'; bpf.frequency.value = 850; bpf.Q.value = 2.5;
        const ng  = ac.createGain();
        ng.gain.setValueAtTime(0.7, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
        ns.connect(bpf); bpf.connect(ng); ng.connect(ac.destination);
        ns.start(t);

        // Twang — triangle oscillator decaying pitch
        const osc = ac.createOscillator();
        const og  = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(210, t);
        osc.frequency.exponentialRampToValueAtTime(52, t + 0.28);
        og.gain.setValueAtTime(0.45, t);
        og.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
        osc.connect(og); og.connect(ac.destination);
        osc.start(t); osc.stop(t + 0.28);
    } catch (_) {}
}

function playPop() {
    try {
        const ac = getAC(), t = ac.currentTime;

        // Crack — wide noise burst, high-passed
        const ns  = noise(ac, 0.16);
        const hpf = ac.createBiquadFilter();
        hpf.type = 'highpass'; hpf.frequency.value = 280;
        const ng  = ac.createGain();
        ng.gain.setValueAtTime(1.6, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
        ns.connect(hpf); hpf.connect(ng); ng.connect(ac.destination);
        ns.start(t);

        // Thump — sine sweep down (air pressure)
        const osc = ac.createOscillator();
        const og  = ac.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(160, t);
        osc.frequency.exponentialRampToValueAtTime(18, t + 0.20);
        og.gain.setValueAtTime(1.0, t);
        og.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
        osc.connect(og); og.connect(ac.destination);
        osc.start(t); osc.stop(t + 0.20);
    } catch (_) {}
}

function playDogLaugh() {
    try {
        const ac = getAC();

        // Three "ha" barks with LFO wobble for laugh character
        for (let i = 0; i < 3; i++) {
            const t = ac.currentTime + i * 0.23;

            const osc  = ac.createOscillator();
            const lfo  = ac.createOscillator();
            const lfoG = ac.createGain();
            const filt = ac.createBiquadFilter();
            const g    = ac.createGain();

            // Carrier: sawtooth for bark-like tone
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(190 + i * 22, t);
            osc.frequency.exponentialRampToValueAtTime(130, t + 0.18);

            // LFO: rapid wobble gives the laugh character
            lfo.frequency.value = 14;
            lfoG.gain.value = 28;
            lfo.connect(lfoG);
            lfoG.connect(osc.frequency);

            // Bandpass shapes the "hah" vowel formant
            filt.type = 'bandpass';
            filt.frequency.value = 950;
            filt.Q.value = 1.2;

            // Envelope: sharp attack, hold, decay
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.28, t + 0.025);
            g.gain.setValueAtTime(0.28, t + 0.10);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.21);

            osc.connect(filt); filt.connect(g); g.connect(ac.destination);
            lfo.start(t); lfo.stop(t + 0.21);
            osc.start(t); osc.stop(t + 0.21);
        }
    } catch (_) {}
}

// ─── UPDATE ──────────────────────────────────────────────────
function update() {
    updateDog();

    // Clouds drift
    for (const c of clouds) {
        c.x += c.speed;
        if (c.x > W + 160) c.x = -160;
    }

    // Balloon movement
    if (balloon.active && balloon.popT < 0) {
        balloon.x   += balloon.vx;
        balloon.bobT += 0.022;
        balloon.y    = balloon.baseY + Math.sin(balloon.bobT) * 14;
        // Bounce off walls
        if (balloon.x < balloon.r + 20 || balloon.x > W - balloon.r - 20) {
            balloon.vx *= -1;
            balloon.x   = Math.max(balloon.r + 20, Math.min(W - balloon.r - 20, balloon.x));
        }
    }

    // Pop animation (shrink)
    if (balloon.popT >= 0) {
        balloon.popT -= 0.05;
        if (balloon.popT <= 0) {
            balloon.active = false;
            setTimeout(() => {
                if (arrowsLeft === 0) triggerGameOver();
                else spawnBalloon();
            }, 700);
        }
    }

    // Arrow physics
    if (arrow.flying) {
        arrow.vy    += GRAVITY;
        arrow.x     += arrow.vx;
        arrow.y     += arrow.vy;
        arrow.angle  = Math.atan2(arrow.vy, arrow.vx);

        // Hit balloon?
        if (balloon.active && balloon.popT < 0) {
            const dx = arrow.x - balloon.x, dy = arrow.y - balloon.y;
            if (dx*dx + dy*dy < (balloon.r + 10) * (balloon.r + 10)) {
                popBalloon();
            }
        }

        // Off screen → miss
        if (arrow.x < -200 || arrow.x > W + 200 || arrow.y > H + 150 || arrow.y < -H * 0.5) {
            resetArrow();
            if (arrowsLeft === 0) triggerGameOver();
            else triggerDog();
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.28;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Floating score texts
    for (let i = floatTexts.length - 1; i >= 0; i--) {
        const t = floatTexts[i];
        t.y   -= 1.8;
        t.life -= 0.022;
        if (t.life <= 0) floatTexts.splice(i, 1);
    }
}

function popBalloon() {
    playPop();
    burst(balloon.x, balloon.y, balloon.color);
    balloon.popT  = 1;
    arrow.flying  = false;
    arrow.x = BOW_X; arrow.y = BOW_Y; arrow.angle = -Math.PI / 2;

    score++;
    scoreEl.textContent = score;
    if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('ba_best', best);
    }

    floatTexts.push({ x: balloon.x, y: balloon.y - balloon.r - 10, life: 1 });
}

function triggerGameOver() {
    gameOver = true;
    aiming = false;
    activeTouchId = null;
    mouseDown = false;
    resetArrow();
}

function restart() {
    score = 0;
    scoreEl.textContent = 0;
    arrowsLeft = MAX_ARROWS;
    gameOver = false;
    particles = [];
    floatTexts = [];
    aiming = false;
    activeTouchId = null;
    mouseDown = false;
    balloon.active = false;
    balloon.popT = -1;
    resetArrow();
    spawnBalloon();
}

// ─── DRAW ────────────────────────────────────────────────────
function draw() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawClouds();
    drawDog();   // drawn first so bush masks its lower body
    drawBush();  // always visible as scenery
    if (balloon.active) drawBalloon();
    drawTrajectory();
    drawBow();
    if (arrow.flying) drawArrow(arrow.x, arrow.y, arrow.angle, 1);
    drawParticles();
    drawFloatTexts();
    drawArrowQuiver();
    drawHint();
    drawGameOver();
}

function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0,    '#4A90C8');
    g.addColorStop(0.5,  '#8ECAE6');
    g.addColorStop(0.72, '#B8E4C8');
    g.addColorStop(0.82, '#90D878');
    g.addColorStop(1,    '#3A7D44');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Ground
    ctx.fillStyle = '#3A7D44';
    ctx.fillRect(0, H - 60, W, 60);
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(0, H - 60, W, 16);
    // Grass blades
    ctx.fillStyle = '#5DBB63';
    for (let x = 0; x < W; x += 20) {
        const h = 8 + Math.sin(x * 0.18) * 5;
        ctx.fillRect(x, H - 60, 3, -h);
    }
}

function drawCloud(x, y, scale, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FFFFFF';
    ctx.shadowColor = 'rgba(0,0,0,0.06)';
    ctx.shadowBlur  = 14;
    const s = scale;
    ctx.beginPath();
    ctx.arc(x,            y,            38 * s, 0, Math.PI * 2);
    ctx.arc(x + 42 * s,  y - 14 * s,  30 * s, 0, Math.PI * 2);
    ctx.arc(x + 78 * s,  y,            34 * s, 0, Math.PI * 2);
    ctx.arc(x + 40 * s,  y + 16 * s,  28 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawClouds() {
    for (const c of clouds) drawCloud(c.x, c.y, c.scale, c.alpha);
}

function drawBalloon() {
    const { x, y, r, color, popT } = balloon;
    const scale = popT >= 0 ? Math.max(0, popT) : 1;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);

    // String
    ctx.strokeStyle = 'rgba(60,60,60,0.65)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, r);
    ctx.quadraticCurveTo(10, r + 28, 4, r + 72);
    ctx.stroke();

    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.10)';
    ctx.beginPath();
    ctx.ellipse(5, r + 4, r * 0.55, r * 0.14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Main balloon body
    const grd = ctx.createRadialGradient(-r * 0.28, -r * 0.32, r * 0.04, 0, 0, r * 1.18);
    grd.addColorStop(0,   lighten(color, 80));
    grd.addColorStop(0.35, lighten(color, 40));
    grd.addColorStop(0.75, color);
    grd.addColorStop(1,   darken(color, 45));
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.ellipse(0, -r * 0.06, r, r * 1.14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Specular highlight
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.beginPath();
    ctx.ellipse(-r * 0.24, -r * 0.34, r * 0.20, r * 0.34, -0.35, 0, Math.PI * 2);
    ctx.fill();

    // Knot
    ctx.fillStyle = darken(color, 55);
    ctx.beginPath();
    ctx.arc(0, r, 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawBow() {
    const gx = BOW_X, gy = BOW_Y;
    const lx = LIMB_L.x, ly = LIMB_L.y;
    const rx = LIMB_R.x, ry = LIMB_R.y;

    // Limb shadow
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(gx + 3, gy + 18);
    ctx.quadraticCurveTo(gx - 62, gy - 28, lx + 3, ly + 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx + 3, gy + 18);
    ctx.quadraticCurveTo(gx + 68, gy - 28, rx + 3, ry + 3);
    ctx.stroke();

    // Bow limbs (wood)
    const woodGrad = ctx.createLinearGradient(gx - 8, 0, gx + 8, 0);
    woodGrad.addColorStop(0, '#6B3A2A');
    woodGrad.addColorStop(0.45, '#A0522D');
    woodGrad.addColorStop(1, '#8B4513');
    ctx.strokeStyle = woodGrad;
    ctx.lineWidth = 11;
    ctx.beginPath();
    ctx.moveTo(gx, gy + 16);
    ctx.quadraticCurveTo(gx - 65, gy - 28, lx, ly);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx, gy + 16);
    ctx.quadraticCurveTo(gx + 65, gy - 28, rx, ry);
    ctx.stroke();

    // Grip wrap
    ctx.strokeStyle = '#C8A46A';
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(gx, gy - 14);
    ctx.lineTo(gx, gy + 24);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(100,70,20,0.55)';
    ctx.lineWidth = 1.5;
    for (let yy = gy - 12; yy < gy + 24; yy += 5) {
        ctx.beginPath();
        ctx.moveTo(gx - 7, yy);
        ctx.lineTo(gx + 7, yy);
        ctx.stroke();
    }

    // Limb tips
    ctx.fillStyle = '#3D1C0A';
    [LIMB_L, LIMB_R].forEach(t => {
        ctx.beginPath();
        ctx.arc(t.x, t.y, 5, 0, Math.PI * 2);
        ctx.fill();
    });

    // String
    const sm = aiming ? { x: aimX, y: aimY } : getStringMid();
    ctx.strokeStyle = 'rgba(230,230,230,0.9)';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'butt';
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(sm.x, sm.y);
    ctx.lineTo(rx, ry);
    ctx.stroke();

    // Arrow at bow (when not flying and arrows remain)
    if (!arrow.flying && arrowsLeft > 0) {
        const ref = getStringMid();
        const ax  = aiming ? aimX : ref.x;
        const ay  = aiming ? aimY : ref.y;
        const ang = aiming
            ? Math.atan2(ref.y - aimY, ref.x - aimX)
            : -Math.PI / 2;
        drawArrow(ax, ay, ang, 1);
    }
}

function drawArrow(x, y, angle, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.rotate(angle);

    const L = 74;

    // Shaft
    ctx.shadowColor = 'rgba(0,0,0,0.22)';
    ctx.shadowBlur  = 5;
    ctx.shadowOffsetY = 2;
    const shaftGrd = ctx.createLinearGradient(0, -3, 0, 3);
    shaftGrd.addColorStop(0, '#E8C870');
    shaftGrd.addColorStop(0.5, '#D4A96A');
    shaftGrd.addColorStop(1, '#A07840');
    ctx.strokeStyle = shaftGrd;
    ctx.lineWidth   = 5;
    ctx.lineCap = 'butt';
    ctx.beginPath();
    ctx.moveTo(-L/2 + 12, 0);
    ctx.lineTo( L/2 - 16, 0);
    ctx.stroke();

    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Arrowhead
    ctx.fillStyle   = '#B0B0BA';
    ctx.strokeStyle = '#888';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.moveTo( L/2,      0);
    ctx.lineTo( L/2 - 20, -7);
    ctx.lineTo( L/2 - 13, 0);
    ctx.lineTo( L/2 - 20, 7);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Nock
    ctx.fillStyle = '#5C3010';
    ctx.beginPath();
    ctx.arc(-L/2 + 12, 0, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // Fletching vanes
    const fletchColors = ['#CC2222','#CC2222','#AA1111'];
    const offsets = [[0, -11], [0, 11], [-2, -16]];
    offsets.forEach(([yOff, yTip], i) => {
        ctx.fillStyle = fletchColors[i];
        ctx.beginPath();
        ctx.moveTo(-L/2 + 12, yOff < 0 ? 0 : 0);
        ctx.lineTo(-L/2 + 30, yTip);
        ctx.lineTo(-L/2 + 32, yOff < 0 ? 0 : 0);
        ctx.closePath();
        ctx.fill();
    });

    ctx.restore();
}

function drawTrajectory() {
    if (!aiming) return;
    const sm = getStringMid();
    const dx = sm.x - aimX, dy = sm.y - aimY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 10) return;

    const power = Math.min(dist / MAX_DRAG, 1);
    const speed = power * MAX_SPEED;
    let vx = (dx/dist)*speed, vy = (dy/dist)*speed;
    let px = aimX, py = aimY;

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth   = 2;
    ctx.setLineDash([6, 11]);
    ctx.beginPath();
    ctx.moveTo(px, py);
    for (let i = 0; i < 90; i++) {
        vy += GRAVITY; px += vx; py += vy;
        if (py > H + 60 || px < -80 || px > W + 80) break;
        ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    drawPowerMeter(power);
}

function drawPowerMeter(power) {
    const bw = 150, bh = 16, bx = 24, by = H - 98;

    ctx.save();
    // Background panel
    ctx.fillStyle = 'rgba(0,0,0,0.38)';
    pill(ctx, bx - 8, by - 26, bw + 16, bh + 32, 12);
    ctx.fill();

    // Track
    ctx.fillStyle = '#333';
    pill(ctx, bx, by, bw, bh, 6);
    ctx.fill();

    // Fill
    if (power > 0) {
        const hue = Math.round(120 - power * 120);
        ctx.fillStyle = `hsl(${hue},90%,50%)`;
        pill(ctx, bx, by, bw * power, bh, 6);
        ctx.fill();
    }

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = 'bold 13px -apple-system, system-ui, sans-serif';
    ctx.fillText('POWER', bx, by - 7);
    ctx.restore();
}

function pill(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
}

function drawParticles() {
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle   = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur  = 8;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * Math.max(0, p.life), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function drawFloatTexts() {
    ctx.textAlign = 'center';
    for (const t of floatTexts) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, t.life);
        ctx.font = 'bold 52px -apple-system, system-ui, sans-serif';
        ctx.strokeStyle = '#8B6914';
        ctx.lineWidth   = 5;
        ctx.fillStyle   = '#FFD700';
        ctx.strokeText('+1', t.x, t.y);
        ctx.fillText('+1', t.x, t.y);
        ctx.restore();
    }
    ctx.textAlign = 'left';
}

function drawHint() {
    if (gameOver || score > 0 || arrow.flying) return;
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.78)';
    ctx.font = 'bold 20px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Drag from the bow to aim · Release to shoot!', W / 2, H - 170);
    ctx.textAlign = 'left';
    ctx.restore();
}

// ─── BUSH ────────────────────────────────────────────────────
function drawBush() {
    const bx = dog.x;
    const gy = H - 60; // ground top

    // Dark shadow layer
    ctx.fillStyle = '#1A5C1A';
    ctx.beginPath();
    ctx.arc(bx - 24, gy - 22, 32, 0, Math.PI * 2);
    ctx.arc(bx + 22, gy - 26, 29, 0, Math.PI * 2);
    ctx.arc(bx,      gy - 38, 26, 0, Math.PI * 2);
    ctx.arc(bx - 6,  gy - 12, 26, 0, Math.PI * 2);
    ctx.fill();

    // Mid green
    ctx.fillStyle = '#2A8A2A';
    ctx.beginPath();
    ctx.arc(bx - 22, gy - 25, 29, 0, Math.PI * 2);
    ctx.arc(bx + 20, gy - 29, 26, 0, Math.PI * 2);
    ctx.arc(bx,      gy - 41, 23, 0, Math.PI * 2);
    ctx.arc(bx - 4,  gy - 15, 23, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = '#3CB83C';
    ctx.beginPath();
    ctx.arc(bx - 10, gy - 50, 14, 0, Math.PI * 2);
    ctx.arc(bx + 16, gy - 45, 12, 0, Math.PI * 2);
    ctx.fill();
}

// ─── DOG ─────────────────────────────────────────────────────
function drawDog() {
    if (dog.state === 'hidden') return;

    const x  = dog.x;
    const hy = dog.y; // head centre Y
    const HR = 32;    // head radius

    ctx.save();

    // Body (lower, mostly behind bush)
    ctx.fillStyle = '#C8903A';
    ctx.beginPath();
    ctx.ellipse(x, hy + 58, 28, 46, 0, 0, Math.PI * 2);
    ctx.fill();

    // Raised paws (one each side, hold-belly laugh pose)
    // Left paw
    ctx.fillStyle = '#C8903A';
    ctx.beginPath();
    ctx.ellipse(x - 40, hy + 22, 17, 13, -0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#B07830';
    for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.arc(x - 42 + i * 6, hy + 15, 5.5, 0, Math.PI * 2);
        ctx.fill();
    }
    // Right paw
    ctx.fillStyle = '#C8903A';
    ctx.beginPath();
    ctx.ellipse(x + 40, hy + 22, 17, 13, 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#B07830';
    for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.arc(x + 42 + i * 6, hy + 15, 5.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Floppy ears (behind head)
    ctx.fillStyle = '#8B5E2A';
    ctx.beginPath();
    ctx.ellipse(x - HR + 4, hy - 12, 13, 27, -0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + HR - 4, hy - 12, 13, 27,  0.18, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#D4A043';
    ctx.beginPath();
    ctx.arc(x, hy, HR, 0, Math.PI * 2);
    ctx.fill();

    // Laughing eyes (closed arcs — ^^ shape)
    ctx.strokeStyle = '#3D2010';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(x - 11, hy - 10, 9, Math.PI * 0.15, Math.PI * 0.85);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x + 11, hy - 10, 9, Math.PI * 0.15, Math.PI * 0.85);
    ctx.stroke();

    // Blush
    ctx.fillStyle = 'rgba(255,120,80,0.28)';
    ctx.beginPath();
    ctx.ellipse(x - 22, hy + 4, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 22, hy + 4, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Snout / muzzle
    ctx.fillStyle = '#E8BF70';
    ctx.beginPath();
    ctx.ellipse(x, hy + 10, 16, 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nose
    ctx.fillStyle = '#1C1C1C';
    ctx.beginPath();
    ctx.ellipse(x, hy + 3, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(x - 2, hy + 1, 3, 2.5, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Mouth — open/close with laugh cycle
    const mouthPhase = Math.abs(Math.sin(dog.frame * 0.18));
    ctx.strokeStyle = '#1C1C1C';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(x, hy + 13, 13, 0.08, Math.PI - 0.08);
    ctx.stroke();

    // Teeth (visible roughly half the laugh cycle)
    if (mouthPhase > 0.35) {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(x - 11, hy + 13, 9, 8);
        ctx.fillRect(x + 2,  hy + 13, 9, 8);
    }

    ctx.restore();

    // "HA HA!" text — bounces while laughing
    if (dog.state === 'laughing') {
        const bounce = Math.sin(dog.frame * 0.28) * 5;
        ctx.save();
        ctx.textAlign = 'center';
        ctx.font = 'bold 28px -apple-system, system-ui, sans-serif';
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#5A3A00';
        ctx.fillStyle   = '#FFD700';
        ctx.strokeText('HA HA!', x, hy - HR - 18 + bounce);
        ctx.fillText  ('HA HA!', x, hy - HR - 18 + bounce);
        ctx.textAlign = 'left';
        ctx.restore();
    }
}

// ─── ARROW QUIVER ────────────────────────────────────────────
function drawArrowQuiver() {
    const cols = 5, rows = 2;
    const aW = 10, aH = 34;
    const gapX = 9, gapY = 10;
    const totalW = cols * aW + (cols - 1) * gapX;
    const totalH = rows * aH + (rows - 1) * gapY;

    // Position bottom-right, above the refresh button (~66px from bottom)
    const pad = 20;
    const startX = W - pad - totalW;
    const startY = H - 78 - totalH;

    // Panel background
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    pill(ctx, startX - 10, startY - 10, totalW + 20, totalH + 20, 12);
    ctx.fill();
    ctx.restore();

    for (let i = 0; i < MAX_ARROWS; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cx = startX + col * (aW + gapX) + aW / 2;
        const cy = startY + row * (aH + gapY);
        drawMiniArrow(cx, cy, aH, i >= arrowsLeft);
    }
}

function drawMiniArrow(cx, topY, h, used) {
    ctx.save();
    ctx.globalAlpha = used ? 0.22 : 1;
    ctx.translate(cx, topY);

    // Shaft
    ctx.strokeStyle = used ? '#999' : '#D4A96A';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, h - 5);
    ctx.lineTo(0, 9);
    ctx.stroke();

    // Arrowhead
    ctx.fillStyle = used ? '#777' : '#B0B0BA';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-5, 11);
    ctx.lineTo(0, 7);
    ctx.lineTo(5, 11);
    ctx.closePath();
    ctx.fill();

    // Fletching
    ctx.fillStyle = used ? '#555' : '#CC2222';
    ctx.beginPath();
    ctx.moveTo(-5, h - 4);
    ctx.lineTo(0, h);
    ctx.lineTo(5, h - 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

// ─── GAME OVER OVERLAY ───────────────────────────────────────
function drawGameOver() {
    if (!gameOver) return;

    // Dimmed backdrop
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    // Title
    ctx.font = `bold ${Math.round(Math.min(W, H) * 0.09)}px -apple-system, system-ui, sans-serif`;
    ctx.lineWidth = 7;
    ctx.strokeStyle = '#8B6914';
    ctx.fillStyle   = '#FFD700';
    ctx.strokeText('Game Over!', W / 2, H / 2 - H * 0.10);
    ctx.fillText  ('Game Over!', W / 2, H / 2 - H * 0.10);

    // Score line
    ctx.font = `bold ${Math.round(Math.min(W, H) * 0.055)}px -apple-system, system-ui, sans-serif`;
    ctx.fillStyle = '#FFFFFF';
    ctx.lineWidth = 4;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    const scoreLine = `Score: ${score}   Best: ${best}`;
    ctx.strokeText(scoreLine, W / 2, H / 2 + H * 0.02);
    ctx.fillText  (scoreLine, W / 2, H / 2 + H * 0.02);

    // New best badge
    if (score > 0 && score === best) {
        ctx.font = `bold ${Math.round(Math.min(W, H) * 0.038)}px -apple-system, system-ui, sans-serif`;
        ctx.fillStyle = '#FFD700';
        ctx.fillText('🏆 New best!', W / 2, H / 2 + H * 0.10);
    }

    // Tap to restart
    ctx.font = `bold ${Math.round(Math.min(W, H) * 0.034)}px -apple-system, system-ui, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.70)';
    ctx.fillText('Tap anywhere to play again', W / 2, H / 2 + H * 0.20);

    ctx.textAlign = 'left';
    ctx.restore();
}

// ─── LOOP ────────────────────────────────────────────────────
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// ─── HARD REFRESH ────────────────────────────────────────────
async function hardRefresh() {
    if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
    }
    if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
    }
    location.reload(true);
}

// ─── BOOT ────────────────────────────────────────────────────
resize();
initClouds();
spawnBalloon();
loop();

if ('serviceWorker' in navigator) {
    // Reload once when a new SW takes control so the fresh code is used.
    let swRefreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!swRefreshing) { swRefreshing = true; location.reload(); }
    });

    navigator.serviceWorker.register('./sw.js').then(reg => {
        // If a waiting worker exists (e.g. from a previous visit), activate it now.
        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        reg.addEventListener('updatefound', () => {
            reg.installing.addEventListener('statechange', function () {
                if (this.state === 'installed' && navigator.serviceWorker.controller) {
                    this.postMessage({ type: 'SKIP_WAITING' });
                }
            });
        });
    }).catch(() => {});
}
